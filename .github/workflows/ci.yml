name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - dev
  workflow_dispatch:
    inputs:
      run_bootstrap_e2e:
        description: Run the Docker bootstrap e2e stack
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools==80.9.0
          pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Run Python checks
        run: bash scripts/ci-python.sh

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: VITE_BASE_API=/api/ npm run build --if-present -- --outDir build --assetsDir statics

      - name: Create 404.html
        run: cp ./build/index.html ./build/404.html

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs:
      - python
      - dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/dashboard/package-lock.json

      - name: Build dashboard assets
        working-directory: app/dashboard
        run: |
          npm ci
          VITE_BASE_API=/api/ npm run build --if-present -- --outDir build --assetsDir statics
          cp ./build/index.html ./build/404.html

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=marzban-runtime
          cache-to: type=gha,mode=max,scope=marzban-runtime

  bootstrap-e2e:
    name: Bootstrap e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_bootstrap_e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build E2E toolbox
        uses: docker/build-push-action@v6
        with:
          context: docker/singbox-bootstrap-e2e
          file: docker/singbox-bootstrap-e2e/Dockerfile.toolbox
          load: true
          tags: marzban-singbox-e2e-toolbox:ubuntu22.04
          cache-from: type=gha,scope=singbox-e2e-toolbox
          cache-to: type=gha,mode=max,scope=singbox-e2e-toolbox

      - name: Build E2E panel
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/singbox-bootstrap-e2e/Dockerfile.panel
          load: true
          tags: marzban-bootstrap-e2e-panel:latest
          cache-from: type=gha,scope=singbox-e2e-panel
          cache-to: type=gha,mode=max,scope=singbox-e2e-panel

      - name: Run Docker bootstrap e2e
        env:
          E2E_SKIP_TOOLBOX_BUILD: "1"
          E2E_SKIP_PANEL_BUILD: "1"
        run: bash docker/singbox-bootstrap-e2e/scripts/run-tests.sh
