x-e2e-proxy-env: &e2e-proxy-env
  HTTP_PROXY: ${E2E_HTTP_PROXY:-}
  HTTPS_PROXY: ${E2E_HTTPS_PROXY:-}
  ALL_PROXY: ${E2E_ALL_PROXY:-}
  NO_PROXY: ${E2E_NO_PROXY:-localhost,127.0.0.1,panel,node-a,node-b,node-c,whoami,172.30.10.0/24}
  http_proxy: ${E2E_HTTP_PROXY:-}
  https_proxy: ${E2E_HTTPS_PROXY:-}
  all_proxy: ${E2E_ALL_PROXY:-}
  no_proxy: ${E2E_NO_PROXY:-localhost,127.0.0.1,panel,node-a,node-b,node-c,whoami,172.30.10.0/24}

services:
  toolbox:
    profiles: ["build"]
    build:
      context: .
      dockerfile: Dockerfile.toolbox
      args:
        HTTP_PROXY: ${E2E_HTTP_PROXY:-}
        HTTPS_PROXY: ${E2E_HTTPS_PROXY:-}
        ALL_PROXY: ${E2E_ALL_PROXY:-}
        NO_PROXY: ${E2E_NO_PROXY:-localhost,127.0.0.1,panel,node-a,node-b,node-c,whoami,172.30.10.0/24}
        http_proxy: ${E2E_HTTP_PROXY:-}
        https_proxy: ${E2E_HTTPS_PROXY:-}
        all_proxy: ${E2E_ALL_PROXY:-}
        no_proxy: ${E2E_NO_PROXY:-localhost,127.0.0.1,panel,node-a,node-b,node-c,whoami,172.30.10.0/24}
    image: ${E2E_TOOLBOX_IMAGE:-marzban-singbox-e2e-toolbox:ubuntu22.04}

  panel:
    build:
      context: ../..
      dockerfile: docker/singbox-bootstrap-e2e/Dockerfile.panel
      args:
        HTTP_PROXY: ${E2E_HTTP_PROXY:-}
        HTTPS_PROXY: ${E2E_HTTPS_PROXY:-}
        ALL_PROXY: ${E2E_ALL_PROXY:-}
        NO_PROXY: ${E2E_NO_PROXY:-localhost,127.0.0.1,panel,node-a,node-b,node-c,whoami,172.30.10.0/24}
        http_proxy: ${E2E_HTTP_PROXY:-}
        https_proxy: ${E2E_HTTPS_PROXY:-}
        all_proxy: ${E2E_ALL_PROXY:-}
        no_proxy: ${E2E_NO_PROXY:-localhost,127.0.0.1,panel,node-a,node-b,node-c,whoami,172.30.10.0/24}
    image: marzban-bootstrap-e2e-panel:latest
    environment:
      <<: *e2e-proxy-env
      CORE_RUNTIME: singbox
      DASHBOARD_ENABLED: "False"
      DEBUG: "True"
      UVICORN_PORT: "8000"
      SINGBOX_EXECUTABLE_PATH: /usr/local/bin/sing-box
      SINGBOX_BOOTSTRAP_PANEL_TLS_VERIFY: "False"
      SUDO_USERNAME: admin
      SUDO_PASSWORD: admin
      SQLALCHEMY_DATABASE_URL: sqlite:////var/lib/marzban/e2e.sqlite3
      RATE_LIMIT_ENABLED: "False"
    volumes:
      - panel-data:/var/lib/marzban
    networks:
      e2e_net:
        ipv4_address: 172.30.10.2

  provisioner:
    image: ${E2E_TOOLBOX_IMAGE:-marzban-singbox-e2e-toolbox:ubuntu22.04}
    environment:
      <<: *e2e-proxy-env
      PANEL_URL: https://panel:8000
      PANEL_TLS_VERIFY: "False"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
    volumes:
      - ./scripts:/e2e/scripts:ro
      - e2e-state:/state
    networks:
      - e2e_net
    command: ["/bin/bash", "/e2e/scripts/provision-panel.sh"]

  node-a:
    image: ${E2E_TOOLBOX_IMAGE:-marzban-singbox-e2e-toolbox:ubuntu22.04}
    environment:
      <<: *e2e-proxy-env
      NODE_NAME: node-a
      E2E_OCCUPY_NODE_LINK_PORT: "true"
      SING_BOX_BINARY_PATH: /opt/marzban/sing-box
      NODE_DOCKER_CONTAINER_NAME: marzban-singbox-e2e-node-a
    volumes:
      - ./scripts:/e2e/scripts:ro
      - e2e-state:/state:ro
      - ../../sing-box-1.13.14-linux-amd64/sing-box:/opt/marzban/sing-box:ro
      - ./runtime/node-a/etc:/etc/marzban-singbox
      - ./runtime/node-a/data:/var/lib/marzban-singbox
      - ./runtime/node-a/compose:/opt/marzban-singbox
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      e2e_net:
        ipv4_address: 172.30.10.11
    command: ["/bin/bash", "/e2e/scripts/node-entrypoint.sh"]

  node-b:
    image: ${E2E_TOOLBOX_IMAGE:-marzban-singbox-e2e-toolbox:ubuntu22.04}
    environment:
      <<: *e2e-proxy-env
      NODE_NAME: node-b
      SING_BOX_BINARY_PATH: /opt/marzban/sing-box
      NODE_DOCKER_CONTAINER_NAME: marzban-singbox-e2e-node-b
    volumes:
      - ./scripts:/e2e/scripts:ro
      - e2e-state:/state:ro
      - ../../sing-box-1.13.14-linux-amd64/sing-box:/opt/marzban/sing-box:ro
      - ./runtime/node-b/etc:/etc/marzban-singbox
      - ./runtime/node-b/data:/var/lib/marzban-singbox
      - ./runtime/node-b/compose:/opt/marzban-singbox
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      e2e_net:
        ipv4_address: 172.30.10.12
    command: ["/bin/bash", "/e2e/scripts/node-entrypoint.sh"]

  node-c:
    image: ${E2E_TOOLBOX_IMAGE:-marzban-singbox-e2e-toolbox:ubuntu22.04}
    environment:
      <<: *e2e-proxy-env
      NODE_NAME: node-c
      SING_BOX_BINARY_PATH: /opt/marzban/sing-box
      NODE_DOCKER_CONTAINER_NAME: marzban-singbox-e2e-node-c
    volumes:
      - ./scripts:/e2e/scripts:ro
      - e2e-state:/state:ro
      - ../../sing-box-1.13.14-linux-amd64/sing-box:/opt/marzban/sing-box:ro
      - ./runtime/node-c/etc:/etc/marzban-singbox
      - ./runtime/node-c/data:/var/lib/marzban-singbox
      - ./runtime/node-c/compose:/opt/marzban-singbox
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      e2e_net:
        ipv4_address: 172.30.10.13
    command: ["/bin/bash", "/e2e/scripts/node-entrypoint.sh"]

  whoami:
    image: ${E2E_TOOLBOX_IMAGE:-marzban-singbox-e2e-toolbox:ubuntu22.04}
    environment:
      <<: *e2e-proxy-env
    volumes:
      - ../singbox-poc/scripts:/poc/scripts:ro
    networks:
      e2e_net:
        ipv4_address: 172.30.10.30
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        if [ "$${E2E_INSTALL_DEPS:-false}" = "true" ]; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends python3
        fi
        exec python3 /poc/scripts/whoami.py

networks:
  e2e_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24

volumes:
  panel-data:
  e2e-state:
